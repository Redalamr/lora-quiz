<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoRA — Questions par Slide</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #2a3a52;
  --cyan: #22d3ee;
  --cyan-dim: #0e7490;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --purple: #a78bfa;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}
.app { max-width: 960px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  text-align: center;
  padding: 40px 20px 30px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 30px;
}
.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.6rem;
  color: var(--cyan);
  letter-spacing: -0.5px;
}
.header p {
  color: var(--text-dim);
  margin-top: 8px;
  font-size: 0.9rem;
}

/* Person tabs */
.person-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.person-tab {
  flex: 1;
  min-width: 140px;
  padding: 14px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.person-tab:hover { border-color: var(--cyan-dim); }
.person-tab.active {
  border-color: var(--cyan);
  background: linear-gradient(135deg, rgba(34,211,238,0.08), rgba(34,211,238,0.02));
  box-shadow: 0 0 20px rgba(34,211,238,0.1);
}
.person-tab .name {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
}
.person-tab.active .name { color: var(--cyan); }
.person-tab .slides-info {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Slide selector */
.slide-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.slide-tab {
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-dim);
  transition: all 0.2s;
}
.slide-tab:hover { border-color: var(--cyan-dim); color: var(--text); }
.slide-tab.active {
  background: var(--cyan);
  color: var(--bg);
  border-color: var(--cyan);
  font-weight: 700;
}

/* Slide title */
.slide-title {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: var(--cyan);
}

/* Controls */
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--cyan-dim); }
.btn.active-btn { background: var(--cyan-dim); border-color: var(--cyan); color: white; }
.counter {
  margin-left: auto;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

/* Filter pills */
.filter-row { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.pill {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.pill[data-d="facile"] { border-color: var(--green); color: var(--green); }
.pill[data-d="facile"].on { background: var(--green); color: var(--bg); }
.pill[data-d="moyen"] { border-color: var(--yellow); color: var(--yellow); }
.pill[data-d="moyen"].on { background: var(--yellow); color: var(--bg); }
.pill[data-d="difficile"] { border-color: var(--red); color: var(--red); }
.pill[data-d="difficile"].on { background: var(--red); color: var(--bg); }
.pill[data-d="expert"] { border-color: var(--purple); color: var(--purple); }
.pill[data-d="expert"].on { background: var(--purple); color: var(--bg); }

/* Questions */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.question-card:hover { border-color: var(--cyan-dim); }
.question-header {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  user-select: none;
}
.q-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-muted);
  background: var(--surface2);
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  margin-top: 2px;
}
.q-diff {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  margin-top: 2px;
}
.q-diff.facile { background: rgba(52,211,153,0.15); color: var(--green); }
.q-diff.moyen { background: rgba(251,191,36,0.15); color: var(--yellow); }
.q-diff.difficile { background: rgba(248,113,113,0.15); color: var(--red); }
.q-diff.expert { background: rgba(167,139,250,0.15); color: var(--purple); }
.q-text {
  flex: 1;
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--text);
}
.q-chevron {
  color: var(--text-muted);
  font-size: 1.1rem;
  transition: transform 0.2s;
  margin-top: 2px;
}
.question-card.open .q-chevron { transform: rotate(90deg); }
.answer {
  display: none;
  padding: 0 18px 16px 18px;
  margin-left: 40px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.question-card.open .answer { display: block; }
.answer p {
  font-size: 0.85rem;
  line-height: 1.6;
  color: var(--text-dim);
}

@media (max-width: 600px) {
  .person-tab { min-width: 100%; }
  .header h1 { font-size: 1.2rem; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>LoRA — Préparation Questions Orales</h1>
    <p>Sélectionne ta personne, puis ta slide. Clique sur une question pour voir la réponse.</p>
  </div>
  <div class="person-tabs" id="personTabs"></div>
  <div class="slide-tabs" id="slideTabs"></div>
  <div class="slide-title" id="slideTitle"></div>
  <div class="controls">
    <button class="btn" id="btnToggle" onclick="toggleAll()">Tout ouvrir</button>
    <div class="counter" id="counter"></div>
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div id="questions"></div>
</div>

<script>
const DATA = {
  persons: [
    { id: 1, name: "Personne 1", slides: [2, 3], theme: "Problème & approches" },
    { id: 2, name: "Personne 2", slides: [4, 5, 6], theme: "Architecture & mécanismes" },
    { id: 3, name: "Personne 3", slides: [7, 8, 9], theme: "Théorie, entraînement & résultats" },
    { id: 4, name: "Personne 4", slides: [10, 11], theme: "Limites & positionnement" }
  ],
  slides: {
    2: {
      title: "Slide 2 — Le goulot d'étranglement de l'adaptation",
      questions: [
        {d:"facile",q:"Combien de paramètres possède le modèle SDXL mentionné dans la slide ?",a:"SDXL possède environ 3,5 milliards de paramètres."},
        {d:"facile",q:"Quel type de GPU est requis pour un full fine-tuning de SDXL ?",a:"Des GPU NVIDIA A100, avec 80 Go de VRAM chacun."},
        {d:"facile",q:"Quels sont les trois obstacles au fine-tuning complet présentés sur cette slide ?",a:"Le coût computationnel, le surapprentissage (overfitting), et l'oubli catastrophique (catastrophic forgetting)."},
        {d:"facile",q:"Qu'est-ce que le surapprentissage dans le contexte du fine-tuning ?",a:"Le modèle mémorise les exemples d'entraînement au lieu de généraliser. Il reproduit ses données de training mais perd sa capacité à traiter de nouvelles entrées."},
        {d:"facile",q:"Qu'est-ce que le catastrophic forgetting ?",a:"C'est quand la modification directe des poids originaux du modèle détruit irrémédiablement les capacités générales acquises lors du pré-entraînement."},
        {d:"moyen",q:"Pourquoi le surapprentissage est-il particulièrement grave quand on fine-tune sur 20 images ?",a:"Parce qu'un modèle de milliards de paramètres a une capacité bien supérieure à ce que 20 images peuvent enseigner. Il va mémoriser ces 20 exemples au lieu d'apprendre des patterns généralisables. Le ratio paramètres/données est extrêmement déséquilibré."},
        {d:"moyen",q:"Pourquoi le coût financier du fine-tuning est-il qualifié de 'prohibitif' ?",a:"Plusieurs GPU A100 coûtent des dizaines de milliers d'euros chacun, les heures de calcul s'accumulent, et il faut potentiellement stocker un modèle complet par variante (plusieurs Go chacun). C'est inaccessible pour la plupart des équipes."},
        {d:"moyen",q:"Quelle est la différence entre overfitting et catastrophic forgetting ?",a:"L'overfitting = le modèle apprend trop bien les données d'entraînement et ne généralise plus. Le catastrophic forgetting = le modèle oublie ses connaissances antérieures en les écrasant avec les nouvelles. L'un concerne la généralisation, l'autre la rétention."},
        {d:"moyen",q:"Sur le graphique de la slide, pourquoi la validation loss remonte-t-elle ?",a:"C'est le signe classique du surapprentissage. Le modèle continue à réduire sa training loss en mémorisant les données, mais sa capacité à généraliser (mesurée par la validation loss) se dégrade progressivement."},
        {d:"moyen",q:"Pourquoi 80 Go de VRAM sont-ils nécessaires ?",a:"Pour stocker simultanément les poids du modèle (en float32 ou float16), les activations intermédiaires, les gradients, et les états de l'optimiseur (Adam stocke 2 moments par paramètre). Tout cela pour 3,5 milliards de paramètres."},
        {d:"difficile",q:"Comment le catastrophic forgetting est-il lié à la plasticité-stabilité du réseau ?",a:"C'est le dilemme stabilité-plasticité : un réseau doit être assez plastique pour apprendre de nouvelles tâches, mais assez stable pour retenir les anciennes. Le fine-tuning complet maximise la plasticité au détriment total de la stabilité, d'où la perte des connaissances antérieures."},
        {d:"difficile",q:"Pourquoi l'optimiseur Adam aggrave-t-il le problème de VRAM ?",a:"Adam maintient deux moments (moyenne mobile du gradient et du gradient au carré) pour chaque paramètre entraînable. Pour un modèle de 3,5B paramètres en float32, cela représente 2 × 3,5B × 4 octets = ~28 Go de VRAM supplémentaire rien que pour l'optimiseur."},
        {d:"difficile",q:"Si le problème est l'overfitting sur peu de données, pourquoi ne pas simplement augmenter le dataset ?",a:"Parce que dans de nombreux cas d'usage (personnalisation de sujet, adaptation de domaine médical), les données sont intrinsèquement rares ou coûteuses à obtenir. On ne peut pas toujours avoir 10 000 images d'un personnage fictif ou d'un type de tumeur rare."},
        {d:"difficile",q:"Comment le gradient descent full modifie-t-il l'espace des features internes du modèle de manière destructrice ?",a:"Chaque mise à jour des poids déplace les représentations internes. Sans contrainte, les gradients sur la nouvelle tâche poussent les features dans des directions optimales pour cette tâche mais qui éloignent les représentations des patterns appris lors du pré-entraînement. Les couches partagées ne peuvent pas simultanément encoder ancien et nouveau."},
        {d:"expert",q:"Si on avait un budget VRAM illimité, le full fine-tuning serait-il quand même problématique ? Pourquoi ?",a:"Oui, car le problème de VRAM n'est qu'un obstacle parmi trois. Même avec assez de mémoire, le surapprentissage sur peu de données et l'oubli catastrophique persistent. Le modèle sur-apprend les exemples et perd ses capacités générales. Il faudrait aussi un très large dataset et des techniques comme la prior preservation loss pour contrer ces effets."},
        {d:"expert",q:"Comment le catastrophic forgetting se manifeste-t-il concrètement dans un modèle de diffusion ?",a:"Le modèle perd la capacité de générer des objets/scènes qu'il savait produire avant. Par exemple, après un fine-tuning sur des visages, il peut oublier comment dessiner des paysages, des animaux, ou produire du texte cohérent dans les images. Les distributions internes sont écrasées."},
        {d:"expert",q:"Pourquoi le nombre de paramètres entraînables est-il directement lié au risque d'overfitting avec peu de données ?",a:"C'est le principe de la complexité du modèle vs la taille du dataset. Un modèle avec N paramètres peut théoriquement mémoriser N points de données indépendants. Avec 3,5 milliards de paramètres et 20 images, le modèle a une capacité astronomiquement supérieure aux données, donc il mémorise plutôt qu'il n'apprend."},
        {d:"expert",q:"Quelles alternatives au fine-tuning complet existaient avant LoRA pour lutter contre le catastrophic forgetting ?",a:"EWC (Elastic Weight Consolidation) pénalise les changements aux poids importants pour les tâches précédentes. Progressive Neural Networks gèle les colonnes existantes et en ajoute de nouvelles. Knowledge Distillation utilise le modèle original comme enseignant. PackNet, PathNet, et les méthodes de replay de mémoire sont aussi des approches antérieures."},
        {d:"facile",q:"Quel est l'objectif principal de LoRA tel que formulé en bas de la slide ?",a:"Adapter un modèle massif en n'entraînant qu'une fraction infime des paramètres, sans altérer l'architecture originale."},
        {d:"moyen",q:"Pourquoi stocker un modèle complet par variante est-il problématique en production ?",a:"Chaque variante fait plusieurs Go (ex: 7 Go pour SDXL). Si on veut 100 variantes (styles, sujets…), il faut 700 Go de stockage et autant de mémoire pour le chargement. Ce n'est pas scalable en termes de coût de stockage et de temps de chargement."}
      ]
    },
    3: {
      title: "Slide 3 — Limites des approches antérieures",
      questions: [
        {d:"facile",q:"Combien de paramètres sont entraînés dans le Full Fine-Tuning ?",a:"100% des paramètres du modèle."},
        {d:"facile",q:"Quel est le principal avantage de LoRA par rapport aux Adapter Layers en inférence ?",a:"LoRA n'ajoute aucune latence supplémentaire à l'inférence (latence identique au modèle original), alors que les Adapter Layers ajoutent de la latence car ils sont en série dans le calcul."},
        {d:"facile",q:"Que fait le Prefix Tuning ?",a:"Il ajoute des tokens virtuels (appris) à l'entrée du modèle pour conditionner sa génération, sans modifier les poids du modèle."},
        {d:"facile",q:"Que fait BitFit ?",a:"BitFit n'entraîne que les termes de biais (bias) du modèle, soit moins de 0,1% des paramètres."},
        {d:"facile",q:"Quelle est la fourchette de paramètres entraînés par LoRA ?",a:"Entre 0,1% et 1% des paramètres du modèle."},
        {d:"moyen",q:"Pourquoi les Adapter Layers ajoutent-ils de la latence en inférence ?",a:"Parce que les modules adapter sont insérés en série dans le graphe de calcul. Chaque forward pass doit traverser ces couches supplémentaires séquentiellement, ce qui ajoute du temps de calcul à chaque inférence."},
        {d:"moyen",q:"Pourquoi le Prefix Tuning est-il considéré comme 'moins expressif' ?",a:"Parce qu'il n'agit que sur l'espace d'entrée du modèle (les tokens) sans modifier les poids internes. Les modifications de poids internes permettent des adaptations plus profondes et plus fines du comportement du modèle."},
        {d:"moyen",q:"Comment LoRA atteint-il zéro latence supplémentaire à l'inférence ?",a:"Grâce à la fusion des matrices : on calcule W_fusionné = W₀ + B·A avant le déploiement. La matrice résultante a la même taille que W₀, donc le modèle déployé est architecturalement identique à l'original."},
        {d:"moyen",q:"Pourquoi BitFit est-il trop limité pour des adaptations sérieuses ?",a:"Les biais ne représentent qu'une infime partie de la capacité expressive du réseau. Ils ajustent les seuils d'activation mais ne modifient pas les directions des projections linéaires. Pour des adaptations complexes (nouveau style, nouveau domaine), cette expressivité est largement insuffisante."},
        {d:"moyen",q:"Quel est le compromis historique que LoRA résout selon la synthèse de la slide ?",a:"Le compromis entre expressivité et coût. Avant LoRA, les méthodes économiques (BitFit, Prefix) avaient une qualité limitée, et les méthodes de haute qualité (Full FT) avaient un coût prohibitif. LoRA offre une expressivité maximale avec un coût très faible et latence nulle."},
        {d:"difficile",q:"Les Adapter Layers (Houlsby et al., 2019) insèrent des modules MLP entre les couches. Décrivez leur architecture interne.",a:"Un adapter typique consiste en : une projection descendante (d → r) qui compresse les features, une non-linéarité (ReLU/GELU), une projection montante (r → d) qui re-projette, et une connexion résiduelle (skip connection) autour du tout. Placé après les couches attention et FFN."},
        {d:"difficile",q:"Pourquoi le Prompt Tuning est-il sensible à l'initialisation ?",a:"Les soft prompts sont optimisés par gradient descent dans un espace continu de haute dimension. Selon l'initialisation (aléatoire vs vocabulaire), la trajectoire d'optimisation change drastiquement. Un mauvais point de départ peut mener à des minima locaux sous-optimaux, et la surface de loss est souvent non-convexe."},
        {d:"difficile",q:"LoRA et BitFit ont tous les deux une latence identique à l'inférence. Pourquoi leurs mécanismes sont-ils si différents ?",a:"BitFit ne touche que les biais, qui font déjà partie de l'architecture — rien à fusionner. LoRA ajoute des matrices A et B qui doivent être fusionnées avec W₀ avant déploiement. Le résultat final est le même (même architecture, même taille), mais le mécanisme d'apprentissage est fondamentalement différent : biais simples vs décomposition de bas rang."},
        {d:"difficile",q:"Si les Adapter Layers ont un bon ratio qualité/paramètres, pourquoi n'ont-ils pas été adoptés massivement en production ?",a:"La latence supplémentaire en inférence est rédhibitoire en production industrielle. Dans un pipeline de génération temps-réel ou un service API, chaque milliseconde compte. La latence série des adapters ne peut pas être éliminée par fusion comme LoRA, ce qui les rend impraticables à l'échelle."},
        {d:"expert",q:"Le Prefix Tuning et LoRA modifient tous deux moins de 1% des paramètres. Expliquez pourquoi LoRA produit de meilleurs résultats.",a:"Le Prefix Tuning agit uniquement sur l'espace d'entrée (tokens ajoutés), ce qui limite les modifications aux first-layer representations. LoRA modifie directement les matrices de projection dans les couches d'attention, ce qui affecte le flux d'information à travers tout le réseau. De plus, LoRA cible les couches les plus expressives (attention), alors que le Prefix influence indirectement toutes les couches de manière uniforme et plus faible."},
        {d:"expert",q:"Pourrait-on combiner Prefix Tuning et LoRA ensemble ? Quel serait l'intérêt ?",a:"Oui, c'est techniquement possible et certains travaux l'explorent (MAM Adapter, UniPELT). L'intérêt serait de cumuler un conditionnement au niveau de l'entrée (Prefix) avec des modifications au niveau des projections internes (LoRA). Cela peut capturer des adaptations à différentes granularités, mais complexifie le tuning des hyperparamètres."},
        {d:"expert",q:"Pourquoi dit-on que LoRA est le 'standard de facto' dans l'industrie ?",a:"Trois raisons convergent : 1) zéro latence en inférence grâce à la fusion, 2) fichiers LoRA très légers (~100 Mo vs 7 Go) permettant de stocker/servir des centaines de variantes, 3) qualité comparable au full fine-tuning. Cette combinaison est inégalée par aucune autre méthode PEFT et a été massivement adoptée par Hugging Face, CivitAI, Replicate, etc."},
        {d:"facile",q:"Quel est le coût VRAM de LoRA comparé au Full Fine-Tuning ?",a:"LoRA a un coût VRAM 'très faible' contre 'très élevé' pour le Full Fine-Tuning. Typiquement ~6 Go vs ~80 Go pour SDXL."},
        {d:"moyen",q:"En quoi la latence est-elle un critère critique en production ?",a:"En production, les utilisateurs attendent des réponses rapides. Chaque milliseconde de latence supplémentaire impacte l'expérience utilisateur, la scalabilité du service, et le coût d'infrastructure (plus de temps GPU par requête). Un service qui génère des images doit être rapide pour être viable économiquement."},
        {d:"difficile",q:"Comment fonctionne exactement la connexion résiduelle dans les Adapter Layers et pourquoi est-elle nécessaire ?",a:"L'output de l'adapter est ajouté à l'input via une skip connection : output = input + adapter(input). Sans cette connexion résiduelle, l'adapter pourrait perturber les représentations de manière destructrice. La skip connection assure qu'au minimum, les informations originales sont préservées, et l'adapter n'apporte qu'un delta correctif."}
      ]
    },
    4: {
      title: "Slide 4 — Un mécanisme d'adaptation universel",
      questions: [
        {d:"facile",q:"Quels sont les trois domaines d'application de LoRA présentés sur cette slide ?",a:"Les modèles de diffusion (images), les grands modèles de langage (LLM), et les modèles de décision (RL)."},
        {d:"facile",q:"Que signifie RLHF ?",a:"Reinforcement Learning from Human Feedback — l'apprentissage par renforcement à partir des préférences humaines."},
        {d:"facile",q:"Que signifie 'transfert de politique' dans le contexte RL ?",a:"C'est le fait d'adapter un agent entraîné dans un environnement (ex: simulation) à un nouvel environnement (ex: monde réel) sans ré-entraîner le backbone complet."},
        {d:"facile",q:"Donnez un exemple d'adaptation de domaine en modèles de diffusion.",a:"L'imagerie médicale : adapter un modèle de diffusion généraliste pour générer des images de type IRM, scanner, histologie, etc."},
        {d:"facile",q:"Que signifie 'multi-task RL' avec LoRA ?",a:"Chaque tâche a son propre adaptateur LoRA, mais tous les LoRA partagent le même réseau de base (backbone commun)."},
        {d:"moyen",q:"Pourquoi LoRA est-il utile dans le pipeline RLHF des LLMs ?",a:"Dans RLHF, il y a une phase de fine-tuning supervisé (SFT) qui est coûteuse. LoRA réduit drastiquement le coût de cette phase en n'entraînant qu'une fraction des paramètres, rendant RLHF accessible à des équipes avec moins de ressources."},
        {d:"moyen",q:"Comment le 'conditionnement de politique via embeddings appris' fonctionne-t-il ?",a:"Au lieu de modifier la politique directement, on utilise des embeddings de tâche qui passent par les matrices LoRA. Ces embeddings servent de signal de conditionnement : selon l'embedding injecté, l'agent adopte un comportement différent sans changer le backbone."},
        {d:"moyen",q:"Pourquoi la personnalisation de style et la personnalisation de sujet sont-elles des cas d'usage distincts ?",a:"La personnalisation de style modifie comment le modèle génère (texture, couleurs, trait artistique). La personnalisation de sujet modifie quoi le modèle génère (un visage spécifique, un objet précis). Ce sont des modifications à différents niveaux des représentations internes."},
        {d:"moyen",q:"En quoi LoRA dans les LLMs diffère-t-il de LoRA dans les modèles de diffusion ?",a:"Le principe est identique (bypass bas rang sur les matrices d'attention), mais la loss diffère (cross-entropy pour les LLMs, MSE sur le bruit pour la diffusion), les couches cibles peuvent varier, et les données d'entraînement sont de nature très différente (texte vs images + prompts)."},
        {d:"moyen",q:"Pourquoi le multi-task RL avec LoRA est-il plus efficace qu'un modèle séparé par tâche ?",a:"Parce qu'au lieu de stocker N modèles complets pour N tâches, on stocke 1 backbone + N petits LoRA. Cela économise de la mémoire de stockage, permet un chargement dynamique rapide, et chaque LoRA bénéficie des représentations générales du backbone partagé."},
        {d:"difficile",q:"Comment LoRA est-il utilisé concrètement dans le transfert sim-to-real en robotique ?",a:"Le backbone est pré-entraîné en simulation où les données sont abondantes et gratuites. Puis, un LoRA est entraîné avec les données du monde réel (plus rares et coûteuses). Le LoRA capture le 'domain gap' entre simulation et réalité (différences de physique, capteurs, friction…) sans perdre les compétences acquises en simulation."},
        {d:"difficile",q:"Expliquez pourquoi LoRA peut servir de 'ciment' dans des pipelines multimodaux.",a:"LoRA est compatible avec d'autres techniques (ControlNet pour le spatial, IP-Adapter pour le style zero-shot). Grâce à la fusion, il ne modifie pas l'architecture, donc il peut être combiné avec des modules additionnels. Il sert de couche d'adaptation qui 'colle' les différentes composantes du pipeline ensemble."},
        {d:"difficile",q:"Quel est l'avantage du conditionnement par embedding LoRA vs un conditionnement classique par concaténation d'embedding ?",a:"La concaténation d'embedding augmente la dimensionnalité de l'entrée et ne modifie pas les poids du réseau. Le conditionnement via LoRA modifie les projections internes elles-mêmes, permettant une adaptation plus profonde et plus expressive du comportement, tout en restant paramètriquement efficace."},
        {d:"expert",q:"En RL multi-task, comment gère-t-on le chargement dynamique de LoRA selon la tâche pendant l'inférence ?",a:"Deux approches : 1) Fusion préalable : on fusionne le LoRA de la tâche souhaitée avec le backbone (W + BA) avant l'inférence, changement par rechargement. 2) Chargement dynamique : le backbone reste en VRAM et on swap uniquement les petites matrices A et B (~Mo) selon la tâche. La méthode 2 est plus rapide pour du multi-task fréquent car les matrices LoRA sont très légères."},
        {d:"expert",q:"Pourquoi LoRA est-il particulièrement adapté au fine-tuning RLHF comparé aux autres méthodes PEFT ?",a:"RLHF implique des mises à jour fréquentes et itératives (reward model → policy → évaluation). LoRA est idéal car : 1) la fusion permet une inférence rapide pour l'évaluation, 2) le faible nombre de paramètres accélère chaque étape d'optimisation, 3) le rollback est trivial (retirer le LoRA = revenir au modèle de base), 4) on peut sauvegarder des checkpoints LoRA très légers à chaque étape."},
        {d:"moyen",q:"Donnez un exemple concret de 'personnalisation de sujet' avec LoRA.",a:"Entraîner un LoRA sur 10-20 photos d'un personnage fictif (ex: une mascotte d'entreprise) pour que le modèle puisse la générer dans n'importe quelle pose, décor ou situation, tout en conservant son apparence spécifique (coiffure, couleur, proportions)."},
        {d:"facile",q:"Quel domaine est le FOCUS de cette présentation ?",a:"Les modèles de décision (RL) — c'est le focus principal, comme indiqué sur la slide avec le label 'FOCUS'."},
        {d:"difficile",q:"Comparez le coût de personnalisation d'un agent RL via LoRA vs via full fine-tuning en termes concrets.",a:"Full FT : nécessite de re-stocker l'intégralité du réseau (~Go), nécessite beaucoup de données de la nouvelle tâche, risque de catastrophic forgetting sur les tâches précédentes. LoRA : fichier de quelques Mo, 80% moins de données, convergence 3-5x plus rapide, préservation des capacités originales. En termes de temps GPU, LoRA peut réduire les coûts de facteur 10-50x."},
        {d:"expert",q:"Comment les architectures de type Decision Transformer s'intègrent-elles avec LoRA ?",a:"Les Decision Transformers traitent le RL comme un problème de séquence (états, actions, rewards comme tokens). LoRA s'applique aux mêmes matrices d'attention (W_q, W_k, W_v) que dans un LLM classique. Cela permet d'adapter le Decision Transformer à de nouveaux environnements en ne modifiant que les projections d'attention, tout en préservant les capacités de planification générales."},

        {d:"moyen",q:"Pourquoi dit-on que la matrice A 'compresse' l'entrée ?",a:"A projette un vecteur de dimension k vers un vecteur de dimension r, avec r << k. Par exemple, de 1024 vers 16 : c'est une compression de facteur 64. Ce goulot d'étranglement force le modèle à identifier les directions les plus importantes."},

        {d:"difficile",q:"Que se passerait-il si on initialisait B avec une gaussienne au lieu de zéro ?",a:"Le produit B·A serait non nul au départ, donc W' ≠ W₀ dès le premier pas. Le modèle partirait d'un point aléatoirement perturbé, ce qui pourrait destabiliser l'entraînement, produire des sorties incohérentes au début, et potentiellement empêcher la convergence. L'initialisation à zéro de B est donc un choix de stabilité crucial."},
        {d:"difficile",q:"Si r = k, quelle est la différence avec le full fine-tuning ?",a:"Si r = k, les matrices A (k×k) et B (d×k) ont autant de paramètres totaux que W₀ elle-même. Le bypass peut représenter n'importe quelle matrice ΔW de rang plein. On perd tout l'avantage de compression. Mais W₀ reste gelé, donc on n'a toujours que les gradients sur A et B — les états de l'optimiseur ne portent pas sur W₀, ce qui économise encore de la VRAM."},
        {d:"difficile",q:"Comment le gradient est-il calculé dans le bypass LoRA lors de la rétropropagation ?",a:"Par la chain rule : ∂L/∂A = ∂L/∂(B·A·x) · ∂(B·A·x)/∂A = Bᵀ · (∂L/∂y) · xᵀ. De même, ∂L/∂B = (∂L/∂y) · (A·x)ᵀ. Les gradients ne traversent PAS W₀ (gelé), ils ne passent que par le chemin B·A. Cela réduit drastiquement la mémoire nécessaire pour stocker les gradients et les états de l'optimiseur."},
        {d:"expert",q:"Pourquoi LoRA est-il lié à la SVD tronquée et comment cette connexion justifie-t-elle le choix de l'architecture ?",a:"La meilleure approximation de rang r d'une matrice est sa SVD tronquée (théorème d'Eckart-Young). Si ΔW a une faible dimension intrinsèque, sa SVD tronquée capture l'essentiel de l'information. LoRA apprend essentiellement cette décomposition par descente de gradient : B et A convergent vers les r directions les plus importantes de ΔW. La différence est que LoRA n'a pas besoin de calculer la SVD explicitement."},
        {d:"expert",q:"Quel est le lien entre le facteur d'échelle alpha/r et le learning rate dans l'optimisation de LoRA ?",a:"Le scaling factor α/r contrôle l'amplitude de la modification ΔW appliquée. Un grand α/r amplifie les mises à jour de LoRA. Cela interagit directement avec le learning rate : si α/r est trop élevé et le LR aussi, les mises à jour sont trop agressives et déstabilisent l'entraînement. En pratique, on fixe souvent α = r pour avoir un scaling de 1, et on contrôle l'amplitude uniquement via le learning rate."},
        {d:"expert",q:"Pourquoi LoRA permet-il un learning rate plus élevé que le full fine-tuning (1e-4 à 1e-3 vs 1e-5 à 1e-4) ?",a:"Parce que LoRA part d'un point stable (W' = W₀ grâce à l'init zéro de B) et ne modifie que quelques directions dans l'espace des paramètres. Les gradients sont donc plus stables et la surface de loss locale est plus lisse. En full FT, modifier tous les paramètres à la fois crée des interactions complexes entre gradients, nécessitant un LR plus prudent."},

    7: {

        {d:"facile",q:"Qu'est-ce que l'hypothèse de la faible dimension intrinsèque ?",a:"L'idée que les mises à jour utiles ΔW lors d'un fine-tuning vivent dans un sous-espace de très faible dimension par rapport à l'espace total des paramètres."},
        {d:"facile",q:"Qu'est-ce que la SVD (Singular Value Decomposition) ?",a:"C'est une décomposition d'algèbre linéaire qui factorise toute matrice M en U·Σ·Vᵀ, où Σ contient les valeurs singulières ordonnées. La SVD tronquée donne la meilleure approximation de rang r."},

        {d:"facile",q:"Quels risques associe-t-on à un rang r ≥ 64 ?",a:"Un coût VRAM modéré et un risque d'overfitting accru, bien que l'expressivité soit très bonne. Ce rang est réservé aux adaptations complexes."},

        {d:"moyen",q:"Comment la SVD justifie-t-elle théoriquement l'architecture de LoRA ?",a:"Le théorème d'Eckart-Young dit que la meilleure approximation de rang r d'une matrice est sa SVD tronquée. LoRA apprend essentiellement cette approximation : B et A convergent vers les r directions les plus significatives de ΔW. La décomposition B·A est structurellement analogue à U·Σ·Vᵀ tronquée."},
        {d:"moyen",q:"Un rang trop faible 'rate l'adaptation'. Que signifie cela concrètement ?",a:"Le sous-espace de dimension r est trop petit pour capturer toutes les directions de changement nécessaires. Certaines modifications importantes sont projetées à zéro. Le modèle adapté ne capture qu'une partie de ce qu'il devrait apprendre. Par exemple, il peut apprendre le visage d'un personnage mais pas sa coiffure."},
        {d:"moyen",q:"Pourquoi un rang trop élevé conduit-il au surapprentissage ?",a:"Avec un rang élevé, le LoRA a suffisamment de capacité pour mémoriser les données de training plutôt que d'apprendre des patterns généralisables. Le sous-espace est assez grand pour encoder les détails spécifiques de chaque exemple au lieu de capturer les caractéristiques communes."},
        {d:"difficile",q:"Comment le rang intrinsèque d'un problème d'adaptation peut-il être estimé empiriquement ?",a:"On entraîne des LoRA avec différents rangs et on mesure la performance sur un set de validation. On trace la courbe performance vs rang : elle sature à un certain point, indiquant le rang intrinsèque. On peut aussi analyser les valeurs singulières de ΔW obtenu par full FT : le point où elles chutent indique la dimension intrinsèque."},

        {d:"expert",q:"Comment la notion de 'dimension effective' varie-t-elle entre les couches d'un transformeur ?",a:"Les couches profondes ont souvent une dimension effective plus faible (les features sont plus abstraites et régulières), tandis que les couches superficielles ont une dimension effective plus élevée (les features sont plus variées et bas-niveau). Cela signifie qu'un rang uniforme pour toutes les couches est sous-optimal : les couches profondes pourraient utiliser r=4 tandis que les superficielles bénéficieraient de r=16."},
        {d:"facile",q:"Pourquoi cibler W_q et W_v est-il une norme 'empirique' et non théorique ?",a:"Parce que ce choix vient d'expériences qui ont montré que c'est souvent le meilleur compromis, mais il n'y a pas de preuve mathématique que c'est optimal pour toutes les tâches."},
        {d:"moyen",q:"Quels artefacts visuels peut-on observer quand on fine-tune un LoRA sur moins de 5 images ?",a:"Répétition du fond des images de training, poses figées dans les mêmes positions que les exemples, textures qui se répètent de manière reconnaissable, et parfois des éléments parasites (objets de fond qui apparaissent systématiquement). C'est de la mémorisation visuelle."},
        {d:"expert",q:"Comment les méthodes d'allocation de rang adaptif (AdaLoRA) tentent-elles de résoudre le problème du choix empirique du rang ?",a:"AdaLoRA commence avec un rang élevé pour toutes les couches, puis 'prune' itérativement les directions les moins importantes (valeurs singulières les plus faibles) pendant l'entraînement. Le rang final s'adapte automatiquement par couche selon l'importance détectée. Cela élimine le besoin de choisir r manuellement et distribue le budget de paramètres de manière optimale entre les couches."},
        {d:"moyen",q:"Pourquoi la qualité du LoRA est-elle bornée par la qualité du modèle de base ?",a:"LoRA ne fait que de petites modifications à un modèle existant. Si le modèle de base n'a pas les représentations nécessaires pour une tâche (par exemple, un modèle entraîné uniquement sur des photos ne peut pas bien dessiner des dessins animés), le LoRA ne peut pas inventer ces représentations. Il ne peut qu'ajuster ce qui existe déjà."},
        {d:"difficile",q:"Comment les problèmes d'interférence multi-LoRA se comparent-ils au problème classique de multi-task learning ?",a:"C'est fondamentalement le même problème : des tâches qui partagent des représentations mais avec des objectifs potentiellement conflictuels. En multi-task learning classique, les gradients de différentes tâches peuvent s'opposer (gradient conflict). Avec multi-LoRA, la fusion additive assume que les adaptations sont complémentaires, ce qui n'est pas garanti. Les solutions (TIES, DARE) sont analogues aux techniques de gradient surgery en multi-task."}
      ]
    },
    11: {
      title: "Slide 11 — Positionnement dans l'écosystème d'adaptation",
      questions: [
        {d:"facile",q:"Quelles sont les quatre techniques comparées dans le tableau ?",a:"LoRA, DreamBooth, ControlNet, et IP-Adapter."},
        {d:"facile",q:"Quel est le coût de LoRA vs DreamBooth ?",a:"LoRA a un coût très faible, DreamBooth a un coût très élevé (car c'est un full fine-tuning)."},
        {d:"facile",q:"Quel technique offre un excellent contrôle spatial ?",a:"ControlNet est la seule technique avec un excellent contrôle spatial (pose, profondeur, contours)."},
        {d:"facile",q:"Que signifie 'Zero-shot' pour IP-Adapter ?",a:"IP-Adapter peut conditionner la génération sur une image de référence sans aucun entraînement préalable. Il fonctionne dès la première utilisation avec n'importe quelle image."},
        {d:"facile",q:"Quelle combinaison est fréquemment utilisée selon la slide ?",a:"DreamBooth + LoRA (sujet + efficacité) et ControlNet + LoRA (style + pose)."},
        {d:"moyen",q:"Pourquoi DreamBooth + LoRA est-il la combinaison la plus populaire ?",a:"On utilise la stratégie de données de DreamBooth (rare token '[V]', images de régularisation pour contrer l'oubli catastrophique) mais on n'entraîne que les matrices LoRA au lieu de tout le modèle. Résultat : qualité quasi-identique à DreamBooth complet, mais coût dramatiquement réduit (6 Go au lieu de 24 Go, fichier de 100 Mo au lieu de 7 Go)."},
        {d:"moyen",q:"Comment ControlNet et LoRA sont-ils complémentaires ?",a:"ControlNet contrôle le QUOI spatiallement (pose, profondeur, contours de l'image). LoRA contrôle le COMMENT stylistiquement (style artistique, apparence du sujet). Ensemble, on peut générer un personnage spécifique (LoRA) dans une pose spécifique (ControlNet). Ils opèrent à des niveaux différents du pipeline."},
        {d:"moyen",q:"Comment IP-Adapter découple-t-il les cross-attentions texte/image ?",a:"IP-Adapter ajoute un encodeur d'image CLIP qui produit des embeddings de l'image de référence. Ces embeddings sont injectés dans des couches de cross-attention séparées de celles du texte. Le modèle a donc deux sources de conditionnement indépendantes : le texte (style, contexte) et l'image de référence (contenu visuel)."},
        {d:"moyen",q:"Pourquoi LoRA n'offre-t-il pas de contrôle spatial natif ?",a:"LoRA modifie les projections d'attention mais ne crée pas de nouvelles branches de conditionnement spatial. Pour le contrôle spatial, il faut des signaux de guidage (cartes de profondeur, poses) injectés via des convolutions supplémentaires (comme ControlNet). LoRA opère dans l'espace des features, pas dans l'espace spatial."},
        {d:"difficile",q:"Comment la prior preservation loss de DreamBooth fonctionne-t-elle ?",a:"DreamBooth ajoute à la loss standard une pénalité qui force le modèle à continuer de bien générer pour la classe générale (ex: 'chien') en plus du sujet spécifique (ex: 'mon chien Fido'). On génère des images de la classe ('chien') avec le modèle original comme données de régularisation, et on les utilise pendant l'entraînement pour contrer l'oubli catastrophique."},
        {d:"difficile",q:"Comment ControlNet copie-t-il l'encodeur du UNet et pourquoi utilise-t-il des convolutions zéro-initialisées ?",a:"ControlNet clone tout l'encodeur du UNet (moitié du modèle). Le clone reçoit le signal de contrôle (pose, profondeur). Ses sorties sont injectées dans le décodeur du UNet original via des convolutions zéro-initialisées. L'initialisation à zéro garantit que ControlNet ne perturbe pas le modèle au début de l'entraînement (même principe que B=0 dans LoRA). La copie de l'encodeur assure une capacité suffisante pour comprendre les signaux spatiaux."},
        {d:"difficile",q:"Comparez la taille des fichiers sauvegardés pour chaque technique.",a:"LoRA : ~50-150 Mo (matrices A et B seulement). DreamBooth : ~7 Go (modèle complet modifié). ControlNet : ~1.5-3 Go (copie de l'encodeur). IP-Adapter : ~100-500 Mo (encodeur image + couches de cross-attention supplémentaires). LoRA est de loin le plus léger."},
        {d:"difficile",q:"Pourquoi dit-on que LoRA 'sert de ciment' dans les pipelines multimodaux modernes ?",a:"Parce que LoRA peut être combiné avec toutes les autres techniques sans conflit architectural. On peut avoir un backbone + LoRA style + ControlNet pose + IP-Adapter référence, tous fonctionnant ensemble. LoRA ne modifie pas l'architecture (grâce à la fusion), donc il n'interfère pas avec les modules ajoutés par ControlNet ou IP-Adapter. Il 'cimente' les composantes en fournissant la couche de personnalisation commune."},
        {d:"expert",q:"Comment les architectures DiT (Diffusion Transformer) comme FLUX changent-elles l'application de LoRA ?",a:"Les DiT remplacent le UNet par un transformeur pur, ce qui est en fait plus naturel pour LoRA (conçu pour les transformeurs). Les couches d'attention dans DiT sont les mêmes Q,K,V,O que dans un LLM. LoRA s'applique de manière identique. Cependant, les DiT peuvent avoir des architectures d'attention différentes (joint attention texte-image) et des embeddings de timestep différents, nécessitant de reconsidérer quelles couches cibler."},
        {d:"expert",q:"Comment le concept de 'compositionnalité' des LoRA peut-il être amélioré à l'avenir ?",a:"Plusieurs pistes : 1) LoRA orthogonaux : entraîner des LoRA dans des sous-espaces orthogonaux pour garantir l'absence d'interférence. 2) LoRA hiérarchiques : organiser les LoRA par niveaux (base → style → sujet) avec des priorités. 3) Routing dynamique : un routeur appris qui combine les LoRA de manière optimale selon le prompt. 4) Théorie de la composition : développer des garanties mathématiques sur la qualité des fusions."},
        {d:"facile",q:"Quelle est la synthèse en bas de la slide ?",a:"LoRA n'est pas un outil isolé. Il occupe le point optimal du compromis qualité/coût et sert de ciment dans les pipelines multimodaux modernes."},
        {d:"moyen",q:"Qu'est-ce qu'un 'rare token' dans le contexte DreamBooth ?",a:"C'est un token inhabituel (ex: 'sks', '[V]') associé au sujet spécifique pendant l'entraînement. Comme le token est rare dans le vocabulaire du modèle, il a peu de sémantique pré-existante, permettant au modèle de lui associer exclusivement le sujet cible sans conflit avec des concepts existants."},
        {d:"expert",q:"Comment le modèle gère-t-il simultanément LoRA + ControlNet + IP-Adapter pendant l'inférence ?",a:"LoRA est fusionné dans les poids (zéro surcoût). ControlNet est une branche parallèle qui traite le signal spatial et injecte ses features dans le décodeur. IP-Adapter ajoute des couches de cross-attention séparées pour l'image de référence. Les trois opèrent à des niveaux différents : LoRA (poids), ControlNet (features spatiales), IP-Adapter (conditionnement image). Le modèle fait un forward pass unique intégrant les trois contributions."},
        {d:"moyen",q:"Pourquoi IP-Adapter est-il classé 'Bon (Zero-shot)' en style/sujet plutôt qu'Excellent ?",a:"Parce que le zero-shot est moins expressif qu'un entraînement dédié. IP-Adapter capture le style/sujet d'une image de référence via un encodeur CLIP, mais CLIP a des limitations (il encode des concepts sémantiques, pas des détails fins). Un LoRA entraîné sur 20 images du sujet capturera plus de nuances qu'un IP-Adapter utilisant une seule image de référence."},
        {d:"difficile",q:"Pourquoi DreamBooth a-t-il une 'faible compatibilité multi-usage' dans le tableau ?",a:"Parce que DreamBooth modifie tout le modèle. Chaque variante (sujet A, sujet B) nécessite un modèle complet séparé (~7 Go). On ne peut pas facilement switcher entre variantes ou les combiner. Avec LoRA, on charge un LoRA différent (~100 Mo) sur le même backbone, permettant des centaines de variantes avec un seul modèle de base."}
      ]
    }
  }
};

let state = {
  person: 1,
  slide: null,
  allOpen: false,
  filters: new Set(["facile","moyen","difficile","expert"])
};

function init() {
  renderPersonTabs();
  selectPerson(1);
}

function renderPersonTabs() {
  const c = document.getElementById('personTabs');
  c.innerHTML = DATA.persons.map(p => `
    <div class="person-tab ${state.person===p.id?'active':''}" onclick="selectPerson(${p.id})">
      <div class="name">${p.name}</div>
      <div class="slides-info">Slides ${p.slides.join(', ')} — ${p.theme}</div>
    </div>
  `).join('');
}

function selectPerson(id) {
  state.person = id;
  const p = DATA.persons.find(x=>x.id===id);
  state.slide = p.slides[0];
  renderPersonTabs();
  renderSlideTabs();
  renderQuestions();
}

function renderSlideTabs() {
  const p = DATA.persons.find(x=>x.id===state.person);
  const c = document.getElementById('slideTabs');
  c.innerHTML = p.slides.map(s => `
    <div class="slide-tab ${state.slide===s?'active':''}" onclick="selectSlide(${s})">Slide ${s}</div>
  `).join('');
}

function selectSlide(s) {
  state.slide = s;
  state.allOpen = false;
  renderSlideTabs();
  renderQuestions();
}

function renderQuestions() {
  const sd = DATA.slides[state.slide];
  if (!sd) return;
  document.getElementById('slideTitle').textContent = sd.title;

  renderFilters();

  const filtered = sd.questions.filter(q => state.filters.has(q.d));
  document.getElementById('counter').textContent = `${filtered.length} / ${sd.questions.length} questions`;
  document.getElementById('btnToggle').textContent = state.allOpen ? 'Tout fermer' : 'Tout ouvrir';

  const c = document.getElementById('questions');
  c.innerHTML = filtered.map((q, i) => `
    <div class="question-card ${state.allOpen?'open':''}" id="qc${i}">
      <div class="question-header" onclick="toggleQ(${i})">
        <span class="q-number">Q${i+1}</span>
        <span class="q-diff ${q.d}">${q.d}</span>
        <span class="q-text">${q.q}</span>
        <span class="q-chevron">›</span>
      </div>
      <div class="answer"><p>${q.a}</p></div>
    </div>
  `).join('');
}

function renderFilters() {
  const c = document.getElementById('filterRow');
  c.innerHTML = ["facile","moyen","difficile","expert"].map(d => `
    <span class="pill ${state.filters.has(d)?'on':''}" data-d="${d}" onclick="toggleFilter('${d}')">${d}</span>
  `).join('');
}

function toggleFilter(d) {
  if (state.filters.has(d)) state.filters.delete(d);
  else state.filters.add(d);
  renderQuestions();
}

function toggleQ(i) {
  document.getElementById('qc'+i).classList.toggle('open');
}

function toggleAll() {
  state.allOpen = !state.allOpen;
  renderQuestions();
}

init();
</script>
</div>
